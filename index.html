<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>DanceApp · Fee Manager</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script>
      // Initialize Firebase
      firebase.initializeApp({
        apiKey: "AIzaSyBJFRQQQxNusmZGfUgwdWUcZRIsoFaUSCo",
        authDomain: "dance-app-ccf55.firebaseapp.com",
        projectId: "dance-app-ccf55",
        storageBucket: "dance-app-ccf55.firebasestorage.app",
        messagingSenderId: "31796482116",
        appId: "1:31796482116:web:00133920270f24e7d2ac11"
      });
      window.db = firebase.firestore();
      // Enable offline persistence (works when phone has no signal)
      window.db.enablePersistence().catch(function(err) {
        console.log("Persistence:", err.code);
      });

      // Fetch DanceApp_3.jsx, strip the ESM import/export lines that
      // conflict with UMD React, expose hooks as globals, then mount.
      fetch("./DanceApp_3.jsx?v=" + Date.now())
        .then(r => r.text())
        .then(src => {
          // 1. Replace the ESM import with UMD-style destructuring
          src = src.replace(
            /^import\s*\{[^}]+\}\s*from\s*["']react["'];?/m,
            "const { useState, useEffect, useCallback, useRef } = React;"
          );
          // 2. Strip the export keyword so App is just a function in scope
          src = src.replace(/^export\s+default\s+/m, "");
          // 3. Append mounting code
          src += "\nReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));";

          // 4. Transpile with Babel and evaluate
          const output = Babel.transform(src, { presets: ["react"] }).code;
          // eslint-disable-next-line no-new-func
          new Function(output)();
        })
        .catch(err => {
          document.getElementById("root").innerHTML =
            "<pre style='color:red;padding:20px'>" + err + "</pre>";
        });
    </script>
  </body>
</html>
